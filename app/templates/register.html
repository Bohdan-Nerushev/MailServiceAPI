{% extends "base.html" %}

{% block title %}Реєстрація - Mail Service API{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="mb-8 flex items-center">
        <a href="/" class="text-slate-400 hover:text-brand-600 transition-colors mr-4 group">
            <svg class="w-6 h-6 group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor"
                viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18">
                </path>
            </svg>
        </a>
        <h1 class="text-3xl font-bold font-outfit text-slate-900">Новий користувач</h1>
    </div>

    <div class="bg-white p-8 rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-100 animate-slide-up">
        <form action="/ui/register" method="POST" class="space-y-6">
            <div>
                <label for="username" class="block text-sm font-semibold text-slate-700 mb-2">Ім'я користувача</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                        </svg>
                    </span>
                    <input type="text" name="username" id="username" required
                        class="block w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand-600 focus:border-transparent transition-all outline-none"
                        placeholder="Наприклад: ivan_ivanov">
                </div>
            </div>

            <div>
                <label for="password" class="block text-sm font-semibold text-slate-700 mb-2">Пароль</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z">
                            </path>
                        </svg>
                    </span>
                    <input type="password" name="password" id="password" required
                        class="block w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand-600 focus:border-transparent transition-all outline-none"
                        placeholder="••••••••">
                </div>
                <p class="mt-2 text-xs text-slate-500">Пароль буде використано для входу через SMTP/IMAP.</p>
            </div>

            <button type="submit"
                class="w-full py-4 bg-brand-600 text-white rounded-2xl font-bold text-lg hover:bg-brand-700 hover:shadow-lg hover:shadow-brand-600/30 transition-all active:scale-95">
                Створити акаунт
            </button>
        </form>
    </div>

    <!-- Info Box -->
    <div class="mt-12 p-6 bg-brand-50 rounded-2xl border border-brand-100">
        <div class="flex">
            <svg class="w-6 h-6 text-brand-600 mr-3 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
            <div>
                <h4 class="text-sm font-bold text-brand-900">Важливо</h4>
                <p class="text-sm text-brand-700 mt-1">Ця дія також створить домашню директорію користувача в системі
                    Linux для зберігання пошти.</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
