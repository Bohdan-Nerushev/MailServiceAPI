services:
  api:
    image: mail-service-api:latest
    container_name: mail-service-api
    restart: unless-stopped
    ports:
      - "8090:8090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - SMTP_SERVER=host.docker.internal
      - SMTP_PORT=587
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - IMAP_SERVER=host.docker.internal
      - DEBUG=False
      - APP_PORT=8090
    volumes:
      - api_logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  api_logs:
    driver: local
