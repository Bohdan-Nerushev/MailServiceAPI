{% extends "base.html" %}

{% block title %}Зміна пароля - Mail Service API{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="mb-8 flex items-center">
        <a href="/" class="text-slate-400 hover:text-brand-600 transition-colors mr-4 group">
            <svg class="w-6 h-6 group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor"
                viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18">
                </path>
            </svg>
        </a>
        <h1 class="text-3xl font-bold font-outfit text-slate-900">Зміна пароля</h1>
    </div>

    <div class="bg-white p-8 rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-100 animate-slide-up">
        <form action="/ui/change-password" method="POST" class="space-y-6">
            <div>
                <label for="username" class="block text-sm font-semibold text-slate-700 mb-2">Користувач</label>
                <input type="text" name="username" id="username" required
                    value="{{ request.query_params.get('user', '') }}"
                    class="block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand-600 focus:border-transparent transition-all outline-none"
                    placeholder="username">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label for="current_password" class="block text-sm font-semibold text-slate-700 mb-2">Старий
                        пароль</label>
                    <input type="password" name="current_password" id="current_password" required
                        class="block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand-600 focus:border-transparent transition-all outline-none"
                        placeholder="••••••••">
                </div>
                <div>
                    <label for="new_password" class="block text-sm font-semibold text-slate-700 mb-2">Новий
                        пароль</label>
                    <input type="password" name="new_password" id="new_password" required
                        class="block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand-600 focus:border-transparent transition-all outline-none"
                        placeholder="••••••••">
                </div>
            </div>

            <div>
                <label for="confirm_password" class="block text-sm font-semibold text-slate-700 mb-2">Підтвердіть новий
                    пароль</label>
                <input type="password" name="confirm_password" id="confirm_password" required
                    class="block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand-600 focus:border-transparent transition-all outline-none"
                    placeholder="••••••••">
            </div>

            <button type="submit"
                class="w-full py-4 bg-brand-600 text-white rounded-2xl font-bold text-lg hover:bg-brand-700 transition-all active:scale-95 shadow-lg shadow-brand-600/30">
                Оновити пароль
            </button>
        </form>
    </div>
</div>
{% endblock %}
