{% extends "base.html" %}

{% block title %}Вхід - Mail Service API{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="text-center mb-10">
        <h1 class="text-3xl font-bold font-outfit text-slate-900 mb-2">З поверненням</h1>
        <p class="text-slate-500">Увійдіть у свій поштовий акаунт</p>
    </div>

    <div class="bg-white p-8 rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-100 animate-slide-up">
        <form action="/ui/login" method="POST" class="space-y-6">
            <div>
                <label for="username" class="block text-sm font-semibold text-slate-700 mb-2">Ім'я користувача</label>
                <input type="text" name="username" id="username" required
                    class="block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand-600 focus:border-transparent transition-all outline-none"
                    placeholder="username">
            </div>

            <div>
                <label for="password" class="block text-sm font-semibold text-slate-700 mb-2">Пароль</label>
                <input type="password" name="password" id="password" required
                    class="block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand-600 focus:border-transparent transition-all outline-none"
                    placeholder="••••••••">
            </div>

            <button type="submit"
                class="w-full py-4 bg-emerald-600 text-white rounded-2xl font-bold text-lg hover:bg-emerald-700 hover:shadow-lg hover:shadow-emerald-600/30 transition-all active:scale-95">
                Увійти до Inbox
            </button>
        </form>

        <div class="mt-8 pt-8 border-t border-slate-100 text-center">
            <p class="text-sm text-slate-500">Ще немає акаунту? <a href="/ui/register"
                    class="text-brand-600 font-bold hover:underline">Створити зараз</a></p>
        </div>
    </div>
</div>
{% endblock %}
