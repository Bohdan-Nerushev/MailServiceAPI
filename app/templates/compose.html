{% extends "base.html" %}

{% block title %}{{ _('compose_title') }} - Mail Service API{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto">
    <div class="mb-8 flex items-center">
        <a href="/ui/inbox?user={{ user.username }}"
            class="text-slate-400 hover:text-brand-600 transition-colors mr-4 group">
            <svg class="w-6 h-6 group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor"
                viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18">
                </path>
            </svg>
        </a>
        <h1 class="text-3xl font-bold font-outfit text-slate-900 leading-tight">{{ _('compose_title') }}</h1>
    </div>

    {% if success_msg %}
    <div
        class="mb-6 p-4 bg-emerald-50 border border-emerald-100 rounded-2xl flex items-center text-emerald-700 animate-slide-up shadow-lg shadow-emerald-500/10">
        <svg class="w-6 h-6 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
        </svg>
        <span class="font-bold">{{ _('compose_success') }}</span>
    </div>
    <script>
        setTimeout(() => { window.location.href = "/ui/inbox?user={{ user.username }}"; }, 3000);
    </script>
    {% endif %}

    {% if error %}
    <div
        class="mb-6 p-4 bg-rose-50 border border-rose-100 rounded-2xl flex items-center text-rose-700 animate-slide-up shadow-lg shadow-rose-500/10">
        <svg class="w-6 h-6 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
        </svg>
        <span class="font-bold">{{ error }}</span>
    </div>
    {% endif %}

    <div class="bg-white p-8 rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-100 animate-slide-up">
        <form action="/ui/compose?user={{ user.username }}" method="POST" class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label for="to" class="block text-sm font-semibold text-slate-700 mb-2">{{ _('compose_to')
                        }}</label>
                    <input type="email" name="to" id="to" required value="{{ recipient or '' }}"
                        class="block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand-600 focus:border-transparent transition-all outline-none"
                        placeholder="recipient@example.com">
                </div>
                <div>
                    <label for="subject" class="block text-sm font-semibold text-slate-700 mb-2">{{ _('compose_subject')
                        }}</label>
                    <input type="text" name="subject" id="subject" required value="{{ subject or '' }}"
                        class="block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand-600 focus:border-transparent transition-all outline-none"
                        placeholder="{{ _('compose_subject_placeholder') }}">
                </div>
            </div>

            <div>
                <label for="body" class="block text-sm font-semibold text-slate-700 mb-2">{{ _('compose_body')
                    }}</label>
                <textarea name="body" id="body" rows="10" required
                    class="block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand-600 focus:border-transparent transition-all outline-none resize-none"
                    placeholder="{{ _('compose_body_placeholder') }}">{{ body or '' }}</textarea>
            </div>

            <div class="flex justify-end pt-4">
                <button type="submit"
                    class="px-8 py-4 bg-brand-600 text-white rounded-2xl font-bold text-lg hover:bg-brand-700 hover:shadow-lg hover:shadow-brand-600/30 transition-all active:scale-95 flex items-center">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
                    </svg>
                    {{ _('compose_btn_send') }}
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
