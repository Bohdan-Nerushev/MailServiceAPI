{% extends "base.html" %}

{% block title %}Зміна пароля - Mail Service API{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="mb-8 flex items-center">
        <a href="/ui/users" class="text-slate-400 hover:text-brand-600 transition-colors mr-4 group">
            <svg class="w-6 h-6 group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor"
                viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18">
                </path>
            </svg>
        </a>
        <h1 class="text-3xl font-bold font-outfit text-slate-900">Зміна пароля</h1>
    </div>

    <!-- Feedback Alerts (Specific to this page for better UX) -->
    {% if success_msg %}
    <div
        class="mb-6 p-4 bg-emerald-50 border border-emerald-100 rounded-2xl flex items-center text-emerald-700 animate-slide-up shadow-lg shadow-emerald-500/10">
        <svg class="w-6 h-6 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
        </svg>
        <span class="font-bold">{{ success_msg }}</span>
    </div>
    <script>
        setTimeout(() => { window.location.href = "/ui/users"; }, 3000);
    </script>
    {% endif %}

    <div
        class="{% if success_msg %}border-emerald-500 shadow-emerald-200{% else %}border-slate-100 shadow-slate-200{% endif %} bg-white p-8 rounded-3xl shadow-xl transition-all duration-500 border-2 animate-slide-up">
        <form action="/ui/change-password" method="POST" class="space-y-6">
            <div>
                <label for="username" class="block text-sm font-semibold text-slate-700 mb-2">Оберіть акаунт</label>
                <div class="relative group">
                    <select name="username" id="username" required
                        class="block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand-600 focus:border-transparent transition-all outline-none appearance-none cursor-pointer text-slate-700 font-medium group-hover:bg-white group-hover:border-slate-300">
                        <option value="" disabled {% if not user and not request.query_params.get('user') %}selected{%
                            endif %}>Натисніть для вибору...</option>
                        {% for u in users %}
                        <option value="{{ u }}" {% if u==user or u==request.query_params.get('user') %}selected{% endif
                            %}>
                            {{ u }}
                        </option>
                        {% endfor %}
                    </select>
                    <div
                        class="absolute inset-y-0 right-0 flex items-center pr-4 pointer-events-none text-slate-400 group-hover:text-brand-600 transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l4 4 4-4">
                            </path>
                        </svg>
                    </div>
                </div>
            </div>

            <div>
                <label for="current_password" class="block text-sm font-semibold text-slate-700 mb-2">Старий
                    пароль</label>
                <div class="relative">
                    <input type="password" name="current_password" id="current_password" required
                        class="block w-full px-4 pr-12 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand-600 focus:border-transparent transition-all outline-none"
                        placeholder="••••••••">
                    <button type="button" onclick="togglePassword('current_password', this)"
                        class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-brand-600">
                        <svg class="w-5 h-5 eye-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z">
                            </path>
                        </svg>
                        <svg class="w-5 h-5 eye-off-icon hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.046m4.596-4.596A10.064 10.064 0 0112 5c4.478 0 8.268 2.943 9.542 7a10.059 10.059 0 01-4.115 5.196m-5.427-1.112A3 3 0 1111.036 10.97M3 3l18 18">
                            </path>
                        </svg>
                    </button>
                </div>
            </div>

            <div>
                <label for="new_password" class="block text-sm font-semibold text-slate-700 mb-2">Новий пароль</label>
                <div class="relative">
                    <input type="password" name="new_password" id="new_password" required
                        class="block w-full px-4 pr-12 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand-600 focus:border-transparent transition-all outline-none"
                        placeholder="••••••••">
                    <button type="button" onclick="togglePassword('new_password', this)"
                        class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-brand-600">
                        <svg class="w-5 h-5 eye-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z">
                            </path>
                        </svg>
                        <svg class="w-5 h-5 eye-off-icon hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.046m4.596-4.596A10.064 10.064 0 0112 5c4.478 0 8.268 2.943 9.542 7a10.059 10.059 0 01-4.115 5.196m-5.427-1.112A3 3 0 1111.036 10.97M3 3l18 18">
                            </path>
                        </svg>
                    </button>
                </div>
            </div>

            <div>
                <label for="confirm_password" class="block text-sm font-semibold text-slate-700 mb-2">Підтвердіть новий
                    пароль</label>
                <div class="relative">
                    <input type="password" name="confirm_password" id="confirm_password" required
                        class="block w-full px-4 pr-12 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand-600 focus:border-transparent transition-all outline-none"
                        placeholder="••••••••">
                    <button type="button" onclick="togglePassword('confirm_password', this)"
                        class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-brand-600">
                        <svg class="w-5 h-5 eye-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z">
                            </path>
                        </svg>
                        <svg class="w-5 h-5 eye-off-icon hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.046m4.596-4.596A10.064 10.064 0 0112 5c4.478 0 8.268 2.943 9.542 7a10.059 10.059 0 01-4.115 5.196m-5.427-1.112A3 3 0 1111.036 10.97M3 3l18 18">
                            </path>
                        </svg>
                    </button>
                </div>
            </div>

            <button type="submit" {% if success_msg %}disabled{% endif %}
                class="w-full py-4 {% if success_msg %}bg-emerald-500{% else %}bg-brand-600 hover:bg-brand-700{% endif %} text-white rounded-2xl font-bold text-lg transition-all active:scale-95 shadow-lg shadow-brand-600/30 disabled:opacity-50">
                {% if success_msg %}Оновлено ✔{% else %}Оновити пароль{% endif %}
            </button>
        </form>
    </div>
</div>
{% endblock %}
