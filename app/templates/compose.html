{% extends "base.html" %}

{% block title %}Написати листа - Mail Service API{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto">
    <div class="mb-8 flex items-center">
        <a href="/ui/inbox" class="text-slate-400 hover:text-brand-600 transition-colors mr-4 group">
            <svg class="w-6 h-6 group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor"
                viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18">
                </path>
            </svg>
        </a>
        <h1 class="text-3xl font-bold font-outfit text-slate-900 leading-tight">Створити нове повідомлення</h1>
    </div>

    <div class="bg-white p-8 rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-100 animate-slide-up">
        <form action="/ui/compose" method="POST" class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label for="to" class="block text-sm font-semibold text-slate-700 mb-2">Отримувач (E-mail)</label>
                    <input type="email" name="to" id="to" required
                        class="block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand-600 focus:border-transparent transition-all outline-none"
                        placeholder="recipient@example.com">
                </div>
                <div>
                    <label for="subject" class="block text-sm font-semibold text-slate-700 mb-2">Тема листа</label>
                    <input type="text" name="subject" id="subject" required
                        class="block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand-600 focus:border-transparent transition-all outline-none"
                        placeholder="Заголовок повідомлення">
                </div>
            </div>

            <div>
                <label for="body" class="block text-sm font-semibold text-slate-700 mb-2">Повідомлення</label>
                <textarea name="body" id="body" rows="10" required
                    class="block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand-600 focus:border-transparent transition-all outline-none resize-none"
                    placeholder="Ваш текст тут..."></textarea>
            </div>

            <div class="flex justify-end pt-4">
                <button type="submit"
                    class="px-8 py-4 bg-brand-600 text-white rounded-2xl font-bold text-lg hover:bg-brand-700 hover:shadow-lg hover:shadow-brand-600/30 transition-all active:scale-95 flex items-center">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
                    </svg>
                    Надіслати зараз
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
