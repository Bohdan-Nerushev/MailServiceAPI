{% extends "base.html" %}

{% block title %}Вхід - Mail Service API{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="text-center mb-10">
        <h1 class="text-3xl font-bold font-outfit text-slate-900 mb-2">З поверненням</h1>
        <p class="text-slate-500">Увійдіть у свій поштовий акаунт</p>
    </div>

    <div class="bg-white p-8 rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-100 animate-slide-up">
        <form action="/ui/login" method="POST" class="space-y-6">
            <div>
                <label for="username" class="block text-sm font-semibold text-slate-700 mb-2">Ім'я користувача</label>
                <input type="text" name="username" id="username" required
                    class="block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand-600 focus:border-transparent transition-all outline-none"
                    placeholder="username">
            </div>

            <div>
                <label for="password" class="block text-sm font-semibold text-slate-700 mb-2">Пароль</label>
                <div class="relative">
                    <input type="password" name="password" id="password" required
                        class="block w-full px-4 pr-12 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand-600 focus:border-transparent transition-all outline-none"
                        placeholder="••••••••">
                    <button type="button" onclick="togglePassword('password', this)"
                        class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-brand-600">
                        <svg class="w-5 h-5 eye-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z">
                            </path>
                        </svg>
                        <svg class="w-5 h-5 eye-off-icon hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.046m4.596-4.596A10.064 10.064 0 0112 5c4.478 0 8.268 2.943 9.542 7a10.059 10.059 0 01-4.115 5.196m-5.427-1.112A3 3 0 1111.036 10.97M3 3l18 18">
                            </path>
                        </svg>
                    </button>
                </div>
            </div>

            <button type="submit"
                class="w-full py-4 bg-emerald-600 text-white rounded-2xl font-bold text-lg hover:bg-emerald-700 hover:shadow-lg hover:shadow-emerald-600/30 transition-all active:scale-95">
                Увійти до Inbox
            </button>
        </form>

        <div class="mt-8 pt-8 border-t border-slate-100 text-center">
            <p class="text-sm text-slate-500">Ще немає акаунту? <a href="/ui/register"
                    class="text-brand-600 font-bold hover:underline">Створити зараз</a></p>
        </div>
    </div>
</div>
{% endblock %}
