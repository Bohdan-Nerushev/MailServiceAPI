{% extends "base.html" %}

{% block title %}Видалити акаунт - Mail Service API{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="mb-8 flex items-center text-rose-600">
        <a href="/ui/users" class="text-slate-400 hover:text-rose-600 transition-colors mr-4 group">
            <svg class="w-6 h-6 group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor"
                viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18">
                </path>
            </svg>
        </a>
        <h1 class="text-3xl font-bold font-outfit">Видалити акаунт</h1>
    </div>

    <div class="bg-white p-8 rounded-3xl shadow-xl shadow-rose-200/50 border border-rose-100 animate-slide-up">
        <div class="mb-8 p-4 bg-rose-50 text-rose-700 rounded-2xl flex items-start">
            <svg class="w-6 h-6 mr-3 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z">
                </path>
            </svg>
            <p class="text-sm font-medium">Ця дія видалить всі повідомлення та налаштування користувача назавжди.</p>
        </div>

        <form action="/ui/delete-user" method="POST" class="space-y-6">
            <div>
                <label for="username" class="block text-sm font-semibold text-slate-700 mb-2">Користувач для
                    видалення</label>
                <input type="text" name="username" id="username" required
                    value="{{ request.query_params.get('user', '') }}"
                    class="block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-rose-600 focus:border-transparent transition-all outline-none"
                    placeholder="username">
            </div>

            <div>
                <label for="password" class="block text-sm font-semibold text-slate-700 mb-2">Підтвердіть вашим
                    паролем</label>
                <div class="relative">
                    <input type="password" name="password" id="password" required
                        class="block w-full px-4 pr-12 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-rose-600 focus:border-transparent transition-all outline-none"
                        placeholder="••••••••">
                    <button type="button" onclick="togglePassword('password', this)"
                        class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-rose-600">
                        <svg class="w-5 h-5 eye-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z">
                            </path>
                        </svg>
                        <svg class="w-5 h-5 eye-off-icon hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.046m4.596-4.596A10.064 10.064 0 0112 5c4.478 0 8.268 2.943 9.542 7a10.059 10.059 0 01-4.115 5.196m-5.427-1.112A3 3 0 1111.036 10.97M3 3l18 18">
                            </path>
                        </svg>
                    </button>
                </div>
            </div>

            <button type="submit"
                class="w-full py-4 bg-rose-600 text-white rounded-2xl font-bold text-lg hover:bg-rose-700 transition-all active:scale-95 shadow-lg shadow-rose-600/30">
                Видалити безповоротно
            </button>
        </form>
    </div>
</div>
{% endblock %}
